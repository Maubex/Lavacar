{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>América Lavacar — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --usa-red:   #B22234;
            --usa-blue:  #3C3B6E;
            --usa-white: #FFFFFF;
        }

        body {
            min-height: 100vh;
            display: flex;
            background: var(--usa-blue);
            font-family: 'Source Sans 3', sans-serif;
            overflow: hidden;
        }

        /* ── Lado esquerdo — bandeira ── */
        .left-panel {
            width: 45%;
            background: var(--usa-blue);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
            position: relative;
        }

        .left-panel::after {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--usa-red);
        }

        /* Listras da bandeira */
        .flag-stripes {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0.06;
            display: flex;
            flex-direction: column;
        }

        .stripe {
            flex: 1;
        }

        .stripe.red { background: var(--usa-red); }
        .stripe.white { background: white; }

        .brand {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .brand-icon {
            width: 80px;
            height: 80px;
            background: var(--usa-red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 36px;
            box-shadow: 0 8px 32px rgba(178, 34, 52, 0.4);
        }

        .brand-title {
            font-family: 'Oswald', sans-serif;
            font-size: 36px;
            font-weight: 700;
            color: white;
            letter-spacing: 2px;
            text-transform: uppercase;
            line-height: 1.1;
        }

        .brand-subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 8px;
        }

        /* Estrelas */
        .stars {
            margin-top: 40px;
            color: rgba(255,255,255,0.3);
            font-size: 20px;
            letter-spacing: 8px;
        }

        /* ── Lado direito — formulário ── */
        .right-panel {
            width: 55%;
            background: #f8f8fc;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
        }

        .login-box {
            width: 100%;
            max-width: 420px;
        }

        .login-title {
            font-family: 'Oswald', sans-serif;
            font-size: 28px;
            font-weight: 600;
            color: var(--usa-blue);
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid rgba(0,0,0,0.1);
            border-radius: 10px;
            font-family: 'Source Sans 3', sans-serif;
            font-size: 15px;
            color: #1a1a2e;
            background: white;
            transition: all 0.2s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--usa-red);
            box-shadow: 0 0 0 3px rgba(178, 34, 52, 0.08);
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--usa-red);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Oswald', sans-serif;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 12px;
        }

        .btn-login:hover {
            background: var(--usa-blue);
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(60, 59, 110, 0.3);
        }

        .error-msg {
            background: #fff5f5;
            border: 1px solid var(--usa-red);
            color: var(--usa-red);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 14px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .divider {
            height: 1px;
            background: rgba(0,0,0,0.08);
            margin: 32px 0;
        }

        .footer-text {
            text-align: center;
            font-size: 12px;
            color: #9ca3af;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .left-panel { display: none; }
            .right-panel { width: 100%; padding: 40px 24px; }
        }
    </style>
</head>
<body>

    <!-- Lado esquerdo -->
    <div class="left-panel">
        <div class="flag-stripes">
            <div class="stripe red"></div><div class="stripe white"></div>
            <div class="stripe red"></div><div class="stripe white"></div>
            <div class="stripe red"></div><div class="stripe white"></div>
            <div class="stripe red"></div>
        </div>

        <div class="brand">
            <div class="brand-icon">🚗</div>
            <div class="brand-title">América<br>Lavacar</div>
            <div class="brand-subtitle">Sistema de Gestão</div>
            <div class="stars">★ ★ ★ ★ ★</div>
        </div>
    </div>

    <!-- Lado direito -->
    <div class="right-panel">
        <div class="login-box">
            <h1 class="login-title">Bem-vindo!</h1>
            <p class="login-subtitle">Acesse o sistema com suas credenciais.</p>

            {% if form.errors %}
            <div class="error-msg">
                ⚠️ Usuário ou senha incorretos. Tente novamente.
            </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div class="form-group">
                    <label class="form-label">Usuário</label>
                    <input
                        type="text"
                        name="username"
                        class="form-input"
                        placeholder="Digite seu usuário"
                        autofocus
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label">Senha</label>
                    <input
                        type="password"
                        name="password"
                        class="form-input"
                        placeholder="Digite sua senha"
                        required
                    >
                </div>

                <button type="submit" class="btn-login">
                    Entrar →
                </button>
            </form>

            <div class="divider"></div>
            <p class="footer-text">América Lavacar © 2026 — Sistema interno</p>
        </div>
    </div>

</body>
</html>
