{% load static %}
<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'general/css/general.css' %}">
    <link rel="stylesheet" href="{% static 'general/css/base.css' %}">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet">

    {% block 'head' %}{% endblock %}
    <title>America Lavacar</title>
</head>
<body>

    <div class="sidebar">
        <div class="logo-details">
            <div class="logo_name">America Lavacar</div>
            <i class="bx bx-menu" id="btn"></i>
        </div>

        <ul class="nav-list">
            <li>
                <a href="{% url 'dashboard' %}">
                    <i class="bx bx-grid-alt"></i>
                    <span class="links_name">Página inicial</span>
                </a>
                <span class="tooltip">Página inicial</span>
            </li>
            <li>
                <a href="{% url 'clientes' %}">
                    <i class="bx bx-user"></i>
                    <span class="links_name">Clientes</span>
                </a>
                <span class="tooltip">Clientes</span>
            </li>
            <li>
                <a href="{% url 'servicos_home' %}">
                    <i class="bx bx-car"></i>
                    <span class="links_name">Serviços</span>
                </a>
                <span class="tooltip">Serviços</span>
            </li>
        </ul>

        <div class="sidebar-flag">
            <div class="flag-wrap">
                <div class="flag">
                    <div class="canton">
                        <span>★</span><span>★</span><span>★</span>
                        <span>★</span><span>★</span><span>★</span>
                        <span>★</span><span>★</span><span>★</span>
                    </div>
                    <div class="stripes">
                        <div class="s r"></div><div class="s w"></div>
                        <div class="s r"></div><div class="s w"></div>
                        <div class="s r"></div><div class="s w"></div>
                        <div class="s r"></div>
                    </div>
                </div>
            </div>
            <span class="flag-label">América Lavacar</span>
        </div>
    </div>

    <section class="home-section">
        {% block 'dashboard' %}
        {% endblock %}
    </section>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="{% static 'general/js/base.js' %}"></script>

</body>
</html>
